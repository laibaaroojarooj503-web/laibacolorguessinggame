<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Guessing Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <h1>🎨 Color Guessing Game</h1>
    <div class="color-display" id="colorDisplay">#FFFFFF</div>
    <div class="buttons">
      <button class="color-btn" id="btn1"></button>
      <button class="color-btn" id="btn2"></button>
      <button class="color-btn" id="btn3"></button>
      <button class="color-btn" id="btn4"></button>
      <button class="color-btn" id="btn5"></button>
      <button class="color-btn" id="btn6"></button>
    </div>
    <p id="message"></p>
    <button id="resetBtn">New Colors</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
